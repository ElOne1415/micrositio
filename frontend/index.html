<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV - Juan Diego Fajardo</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Fuente desde Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Librería de íconos Feather -->
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- Leaflet (mapas) CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


</head>
<body>
  <div class="container">
    <!-- Encabezado con nombre, foto y perfil -->
    <header>
      <h1 id="nombre"></h1>
      <img id="foto" alt="Foto de perfil">
      <p id="perfil"></p>

      <!-- Links de contacto (email y LinkedIn) -->
      <div id="contacto-links" class="contacto"></div>
    </header>

    <!-- Sección de proyectos -->
    <section>
      <h2>Proyectos</h2>
      <ul id="proyectos"></ul>
    </section>

    <!-- Sección de habilidades -->
    <section>
      <h2>Habilidades</h2>
      <ul id="skills"></ul>
    </section>

    <!-- Botón hacia catálogo de futbolistas -->
    <div class="btn-center">
      <a href="catalog.html" class="btn-catalogo">⚽ Ver Catálogo de Futbolistas</a>
    </div>

    <!-- Botón hacia formulario de contacto -->
    <div class="btn-center">
      <a href="contact.html" class="btn-catalogo">📩 Contacto</a>
    </div>

    <!-- Botón hacia listado de mensajes -->
    <div class="btn-center">
      <a href="menssages.html" class="btn-catalogo">📩 Mensajes</a>
    </div>

    <!-- Sección con mapa de ubicación -->
    <section>
      <h2>Ubicación</h2>
      <div id="map"></div>
    </section>

    <!-- Pie de página -->
    <footer style="text-align:center; margin-top:3rem; font-size:0.9rem; color:#64748b;">
      © 2025 Juan Diego Fajardo Suárez · Desarrollado con FastAPI & SQLite
    </footer>
  </div>

  <script>
    // Función para cargar datos del estudiante desde el backend
    async function cargar(){
      let res = await fetch("http://127.0.0.1:8000/estudiante");
      let data = await res.json();

      // Insertar nombre, foto y perfil
      document.getElementById("nombre").innerText = data.nombre;
      document.getElementById("foto").src = data.foto;
      document.getElementById("perfil").innerText = data.perfil;

      // Insertar links de contacto (email y LinkedIn)
      const contactoDiv = document.getElementById("contacto-links");
      contactoDiv.innerHTML = `
        <a href="mailto:${data.contacto.email}" target="_blank">
          <i data-feather="mail"></i> Email
        </a>
        <a href="${data.contacto.linkedin}" target="_blank">
          <i data-feather="linkedin"></i> LinkedIn
        </a>
      `;

      // Renderizar íconos
      feather.replace();

      // Renderizar lista de proyectos
      data.proyectos.forEach(p => {
        let li = document.createElement("li");
        li.innerHTML = `<strong>${p.nombre}</strong><br><span>${p.descripcion}</span>`;
        document.getElementById("proyectos").appendChild(li);
      });

      // Renderizar lista de habilidades
      data.skills.forEach(s => {
        let li = document.createElement("li");
        li.textContent = s;
        document.getElementById("skills").appendChild(li);
      });
    }
    cargar();

    // Inicializar mapa en Bogotá (coordenadas)
    const map = L.map("map").setView([4.7110, -74.0721], 12);

    // Capa base de OpenStreetMap
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    // Marcador con popup
    L.marker([4.7110, -74.0721]).addTo(map)
      .bindPopup("<b>Juan Diego Fajardo</b><br>Ubicación del estudiante")
      .openPopup();
  </script>
</body>
</html>
