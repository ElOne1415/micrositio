<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes de Contacto</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>


</head>
<body>
  <div class="container">
    <header>
      <h1>📨 Mensajes Recibidos</h1>

      <a href="index.html" class="btn-catalogo">🏠 Volver al Home</a>
    </header>

    <section>
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Mensaje</th>
          </tr>
        </thead>
        <tbody id="tabla-mensajes">
          <!-- Aquí se insertan los mensajes -->
        </tbody>
      </table>
    </section>
  </div>

  <script>
    async function cargarMensajes() {
      try {
        let res = await fetch("http://127.0.0.1:8000/contacto");
        let data = await res.json();

        const tbody = document.getElementById("tabla-mensajes");
        tbody.innerHTML = "";

        data.forEach(m => {
          let fila = `
            <tr>
              <td>${m.nombre}</td>
              <td>${m.email}</td>
              <td>${m.mensaje}</td>
            </tr>
          `;
          tbody.innerHTML += fila;
        });
      } catch (error) {
        console.error("Error cargando mensajes:", error);
      }
    }

    cargarMensajes();
  </script>
</body>
</html>
