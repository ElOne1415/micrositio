<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"> <!-- Configura el uso de caracteres especiales como tildes, ñ y emojis -->
  <title>Catálogo de Futbolistas</title> <!-- Título de la pestaña del navegador -->
  <link rel="stylesheet" href="styles.css"> <!-- Enlace al archivo CSS externo que contiene los estilos -->
</head>
<body>
    
  <!-- Contenedor principal de la página -->
  <div class="container">
    <br><a href="index.html" class="btn-catalogo">🏠 Volver al Home</a>
    <h1>⚽ Catálogo de Futbolistas</h1> <!-- Título visible de la aplicación -->
    
    <!-- Contenedor vacío donde se insertarán dinámicamente las tarjetas de jugadores -->
    <div id="grid" class="grid"></div>
  </div>

  <script>
    // Función asíncrona para cargar los datos desde la API
    async function cargar() {
      // Realiza una solicitud HTTP GET a la API local de jugadores
      let res = await fetch("http://127.0.0.1:8000/jugadores");
      
      // Convierte la respuesta en un objeto JSON utilizable en JavaScript
      let jugadores = await res.json();

      // Obtiene el elemento "grid" donde se colocarán las tarjetas
      let grid = document.getElementById("grid");

      // Recorre cada jugador recibido desde la API
      jugadores.forEach(j => {
        // Crea un contenedor (div) para la tarjeta de cada jugador
        let card = document.createElement("div");
        card.className = "card"; // Asigna una clase para poder aplicarle estilos CSS

        // Inserta contenido HTML dentro de la tarjeta con información del jugador
        card.innerHTML = `
          <img src="${j.imagen}" alt="${j.nombre}"> <!-- Imagen del jugador -->
          <h3>${j.nombre}</h3> <!-- Nombre del jugador -->
          <p>${j.equipo} - ${j.posicion}</p> <!-- Equipo y posición -->
          <!-- Enlace a una página de detalle, pasando el ID del jugador como parámetro -->
          <a href="detail.html?id=${j.id}">Ver más</a>
        `;

        // Agrega la tarjeta creada al contenedor "grid"
        grid.appendChild(card);
      });
    }

    // Llamada inicial para cargar automáticamente los datos al abrir la página
    cargar();
  </script>
</body>
</html>
