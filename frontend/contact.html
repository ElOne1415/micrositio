<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"> <!-- Permite caracteres especiales -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsivo en móviles -->
  <title>Contacto</title>
  <link rel="stylesheet" href="styles.css"> <!-- Vincula los estilos -->
</head>
<body>
  <!-- Contenedor principal -->
  <div class="container">
      <a href="index.html" class="btn-catalogo">🏠 Volver al Home</a>
    <h1>Contacto</h1>

    <!-- Formulario de contacto -->
    <form id="contact-form">
      <!-- Campo de nombre -->
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required>

      <!-- Campo de email -->
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" required>

      <!-- Campo de mensaje -->
      <label for="mensaje">Mensaje</label>
      <textarea id="mensaje" name="mensaje" required></textarea>

      <!-- Botón para enviar -->
      <button type="submit">Enviar</button>
    </form>

    <!-- Mensaje dinámico de respuesta -->
    <p id="response-message" style="margin-top:1rem; color:green;"></p>
    
  </div>

  <script>
    // Obtiene el formulario
    const form = document.getElementById("contact-form");

    // Maneja el envío del formulario
    form.addEventListener("submit", async (e) => {
      e.preventDefault(); // Evita recargar la página

      // Recoge los datos del formulario
      const data = {
        nombre: form.nombre.value,
        email: form.email.value,
        mensaje: form.mensaje.value,
      };

      try {
        // Envía los datos al servidor con fetch
        const res = await fetch("/contacto", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        // Si la respuesta es correcta, muestra mensaje de éxito
        if (res.ok) {
          document.getElementById("response-message").innerText = "✅ Mensaje enviado correctamente";
          form.reset(); // Limpia el formulario
        } else {
          document.getElementById("response-message").innerText = "❌ Error al enviar el mensaje";
        }
      } catch (err) {
        // Si no hay conexión con el servidor
        document.getElementById("response-message").innerText = "❌ No se pudo conectar con el servidor";
      }
    });
  </script>

</body>
</html>
